<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WalkWorld 3D — Playing</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/game.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap" rel="stylesheet" />
</head>
<body class="game-page">

  <!-- ── Loading overlay ── -->
  <div id="loadingOverlay" class="overlay loading-overlay" aria-live="polite">
    <div class="loading-box">
      <div class="load-icon">🌍</div>
      <p class="load-title">Loading World…</p>
      <div class="load-bar-wrap"><div class="load-bar" id="loadBar"></div></div>
      <p class="load-status" id="loadStatus">Connecting…</p>
    </div>
  </div>

  <!-- ── Disconnected overlay ── -->
  <div id="disconnectedOverlay" class="overlay disc-overlay hidden">
    <div class="disc-box">
      <p class="disc-icon">⚠️</p>
      <p class="disc-title">Disconnected</p>
      <p class="disc-msg">Lost connection to server.</p>
      <button class="disc-btn" onclick="window.location.reload()">RECONNECT</button>
      <a class="disc-back" href="index.html">← Back to lobby</a>
    </div>
  </div>

  <!-- ── Pointer-lock overlay ── -->
  <div id="lockOverlay" class="lock-overlay hidden">
    <div class="lock-box">
      <p class="lock-icon">🖱️</p>
      <p class="lock-title">Click to Play</p>
      <p class="lock-sub">Mouse will be captured · ESC to release</p>
    </div>
  </div>

  <!-- ── Game wrapper ── -->
  <div id="gameWrapper" class="game-wrapper hidden">

    <canvas id="gameCanvas" aria-label="3D game world"></canvas>

    <!-- Crosshair -->
    <div class="crosshair" aria-hidden="true">
      <div class="ch-h"></div>
      <div class="ch-v"></div>
    </div>

    <!-- HUD top-left -->
    <div class="hud hud-tl" id="hudPlayer">
      <div class="hud-avatar" id="hudAvatar"></div>
      <div class="hud-info">
        <span class="hud-name" id="hudName">—</span>
        <span class="hud-pos"  id="hudPos">0, 0, 0</span>
        <span class="hud-zone" id="hudZone">Plains</span>
      </div>
    </div>

    <!-- HUD top-right -->
    <div class="hud hud-tr" id="hudOnline">
      <span class="dot-pulse"></span>
      <span id="hudCount">0</span> online
    </div>

    <!-- HUD bottom-left -->
    <div class="hud-bl">
      <div class="compass" id="compass">
        <span class="compass-dir" id="compassDir">N</span>
      </div>
      <div class="controls-hint">
        WASD · Move &nbsp;|&nbsp; Mouse · Look &nbsp;|&nbsp; Space · Jump &nbsp;|&nbsp; T · Chat
      </div>
    </div>

    <!-- Chat -->
    <div class="chat-panel" id="chatPanel" aria-label="Chat">
      <div class="chat-messages" id="chatMessages"></div>
      <form class="chat-form" id="chatForm" autocomplete="off">
        <input
          id="chatInput"
          class="chat-input"
          type="text"
          maxlength="80"
          placeholder="Press T to chat…"
          disabled
        />
        <button class="chat-send" type="submit" aria-label="Send">▶</button>
      </form>
    </div>

  </div>

  <!-- Three.js must load before game modules -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/network.js"></script>
  <script type="module" src="js/world.js"></script>
  <script type="module" src="js/objects.js"></script>
  <script type="module" src="js/player.js"></script>
  <script type="module" src="js/game.js"></script>

</body>
</html>
